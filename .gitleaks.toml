title = "Artidor Gitleaks Config"

[allowlist]
description = "Allowed example files"
paths = [
  '''README.*''',
  '''.*\.example$''',
  '''apps/web/\.env\.example'''
]
regexes = [
  # CI workflow placeholder env values that accidentally match the
  # generic-api-key rule (e.g. "your-upstash-redis-token"). Real secrets
  # must never use the "your-*" prefix convention — any secret starting
  # with "your-" is suspicious and should be investigated.
  '''["']your-[a-z0-9-]+["']''',
]

[[rules]]
id = "generic-api-key"
description = "Generic API key"
regex = '''(?i)(api[_-]?key|secret|token|password|credential)\s*[:=]\s*['"][A-Za-z0-9_\-]{16,}['"]'''
tags = ["key", "API", "generic"]

[[rules]]
id = "private-key"
description = "Private key"
regex = '''-----BEGIN (RSA|DSA|EC|OPENSSH|PGP) PRIVATE KEY-----'''
tags = ["key", "private"]
