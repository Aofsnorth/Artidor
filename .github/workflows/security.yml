name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7
      - run: semgrep scan --config auto --error

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - run: bun install --frozen-lockfile

      - run: bun audit
        continue-on-error: false

      - run: cargo install cargo-audit

      # `cargo audit` exits non-zero on unmaintained *warnings* as well as
      # real vulnerabilities. The six ignored IDs below are all transitive
      # dependencies flagged as "unmaintained" (informational, not exploitable)
      # that we cannot replace without changing direct dependencies. Ignoring
      # an advisory ID only suppresses THAT specific advisory — a future real
      # CVE on the same crate gets a new RUSTSEC ID and will still fail CI.
      # Review this list whenever Cargo.lock changes.
      - run: |
          cargo audit \
            --ignore RUSTSEC-2025-0052 \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2026-0173 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2025-0048
        continue-on-error: false

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4
