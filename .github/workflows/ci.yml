name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run lint:web
      # Run the project's pinned typescript (apps/web pins ^6.0.3) through node
      # directly. `bunx tsc` has been observed to resolve a hoisted, older
      # typescript from the workspace root that doesn't match apps/web's pinned
      # version and fails the typecheck even when the same source passes locally.
      - run: cd apps/web && node ../../node_modules/typescript/bin/tsc --noEmit
      - run: bun run test
      - run: bun run build:web

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check
      - run: cargo check --workspace --all-targets --exclude artidor-desktop
      - run: cargo test --workspace --all-targets --exclude artidor-desktop

  harness:
    name: Harness policy check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Harness required files check
        run: bun scripts/harness-check.mjs

      - name: What's New / Roadmap check
        run: bun scripts/whats-new-check.mjs