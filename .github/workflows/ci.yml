name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://artidor:***@localhost:5432/artidor"
      BETTER_AUTH_SECRET: "supersecret"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      UPSTASH_REDIS_REST_URL: "https://your-upstash-redis-url"
      UPSTASH_REDIS_REST_TOKEN: "your-upstash-redis-token"
      NEXT_PUBLIC_MARBLE_API_URL: "https://placeholder.example.com"
      MARBLE_WORKSPACE_KEY: "placeholder"
      FREESOUND_CLIENT_ID: "placeholder"
      FREESOUND_API_KEY: "placeholder"
      PEXELS_API_KEY: "placeholder"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.2.18

      - run: bun install --frozen-lockfile
      - run: bun run lint:web
      # Use the workspace-installed CLI (not `npx`, which fetches an unpatched
      # copy into its own cache, bypassing patchedDependencies/resolutions).
      - run: cd apps/web && bun run build:content
      - run: cd apps/web && bunx tsc --noEmit
      - run: bun run test
      - run: cd apps/web && bunx next build

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - run: cargo fmt --all -- --check
      - run: cargo check --workspace --all-targets --exclude artidor-desktop --exclude artidor-desktop-tauri
      - run: cargo test --workspace --all-targets --exclude artidor-desktop --exclude artidor-desktop-tauri

  harness:
    name: Harness policy check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.2.18

      - name: Harness required files check
        run: bun scripts/harness-check.mjs

      - name: What's New / Roadmap check
        run: bun scripts/whats-new-check.mjs