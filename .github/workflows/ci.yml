name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - run: bun install --frozen-lockfile
      - run: bun run lint:web
      # Use the workspace-installed CLI (not `npx`, which fetches an unpatched
      # copy into its own cache, bypassing patchedDependencies/resolutions).
      - run: cd apps/web && bun run build:content
      - run: cd apps/web && bunx tsc --noEmit
      - run: bun run test
      - run: cd apps/web && npx next build

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check
      - run: cargo check --workspace --all-targets --exclude artidor-desktop
      - run: cargo test --workspace --all-targets --exclude artidor-desktop

  harness:
    name: Harness policy check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - name: Harness required files check
        run: bun scripts/harness-check.mjs

      - name: What's New / Roadmap check
        run: bun scripts/whats-new-check.mjs